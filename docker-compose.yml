version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pocketcode-server
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - /workspace/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - WORKSPACE=/workspace
      - COPILOT_AUTH_MODE=${COPILOT_AUTH_MODE:-logged-in-user}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - REPO_CONTEXT=${REPO_CONTEXT}
    stdin_open: true
    tty: true
    restart: unless-stopped
